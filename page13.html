<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Destroy Machine Button</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">

<style>
		body, html {
		margin: 0;
		padding: 0;
		height: 100%;
		color: black;
		background-color: #c7cbcc;
		}
		.background {
		position: fixed;
		bottom: 0;
		left: 0;
		width: 100%;
		height: auto;
		max-height: 78vh;
		object-fit: contain;
		}
		.line1 {
		opacity: 0;
		animation: fadeIn .3s forwards;
		animation-delay: 0.5s; 
		}
		@keyframes fadeIn {to {opacity: 1;}}
		.line2 {
		overflow: hidden;
		white-space: nowrap;
		border-right: 3px solid white;
		width: 0;
		animation:
		typing 2.5s steps(40,end) 1s forwards,
		blink .8s infinite;
		}
		.line3 {
		overflow: hidden;
		white-space: nowrap;
		border-right: 3px solid white;
		width: 0;
		animation:
		typing 3s steps(40,end) 3.8s forwards,
		blink .8s infinite;
		}
		@keyframes typing {from { width: 0 } to { width: 100% }}
		@keyframes blink {50% { border-color: transparent }}
		.overlay h1 {
			font-family: "Georgia", serif; 
			font-size: 3rem;
		}
		.glow {
		text-shadow:
		0 0 5px white,
		0 0 20px #6cffb8;
		}
		.overlay h4 {
			font-family: "Orbitron", serif;
		}
		.overlay .btn-container {
		font-family: "orbitron", serif;
		position: absolute;
		bottom: 26vh;
		left: 50%;
		transform: translateX(-50%);
		display: flex;
		flex-wrap: wrap;
		justify-content: center; 
		gap: 50px; 
		}
		.btn-destroy {
		width: 170px;
		height: 170px;
		border-radius: 50%;
		font-size: 1.2rem;
		font-weight: bold;
		display: flex;
		justify-content: center;
		align-items: center;
		transition: all 0.3s ease;
		}
		.btn-danger:hover {
		box-shadow: 0 0 15px #dc3545, 0 0 45px #dc3545;
		transform: scale(1.05);
		}
	</style>
</head>
<body>

	<img src="assets/img/destroy.png" class="background" alt="Destroy Button">

	<div class="overlay container">
		<h1 class="line1 glow">Good choice!</h1>
		<h4 class="line2">Press the button to destroy the time machine.</h4>
		<h4 class="line3">Everything will go back to normal, hopefully...</h4>
	<div class="btn-container">
    	<a href="page14.html" class="btn btn-danger btn-destroy btn-md">DESTROY</a>
	</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
