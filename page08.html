<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Dinosaur Death</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">

<style>
		body, html {
		margin: 0;
		padding: 0;
		height: 100%;
		color: black;
		background-color: #5f5850;
		z-index: -1;
		}
		.background {
		position: fixed;
		bottom: 0;
		left: 0;
		width: 100%;
		height: auto;
		max-height: 100vh;
		}
		.overlay {
		position: relative;
		z-index: 1;
		}
		.overlay h1 {
			font-family: "Georgia", serif; 
			font-size: 3rem;
		}
		.overlay h4 {
			font-family: "Orbitron", serif;
		}
		.btn-container {
		font-family: "orbitron", serif;
		position: fixed;
		bottom: 20px;
		left: 50%;
		transform: translateX(-50%);
		display: flex;
		justify-content: center;
		gap: 50px;
		z-index: 2;
		}
		.btn-danger {
		box-shadow: 0 0 10px #dc3545;
		transition: all 0.3s ease;
		}
		.btn-danger:hover {
		box-shadow: 0 0 15px #dc3545, 0 0 40px #dc3545;
		transform: scale(1.08);
		}
	</style>
</head>
<body>

	<img src="assets/img/dino_chase.png" class="background" alt="Hungry Dinosaur">

	<div class="overlay container">
		<h1>Bad choice...</h1>
		<h4>Dinosaurs think you're new food! They chomp down before you can run.</h4>
	<div class="btn-container">
    	<a href="page03.html" class="btn btn-danger btn-lg">Meet your fate</a>
	</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
