<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Future of Pigeons</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">

<style>
		body, html {
		margin: 0;
		padding: 0;
		height: 100%;
		color: white;
		background-color: #62791c;
		}
		.background {
		position: fixed;
		bottom: 0;
		left: 0;
		width: 100%;
		height: auto;
		max-height: 81vh;
		}
		.overlay {
		position: relative;
		z-index: 1;
		}
		.overlay h1 {
			font-family: "Georgia", serif; 
			font-size: 3rem;
		}
		.overlay h4 {
			font-family: "Orbitron", serif;
		}
		.btn-container {
		font-family: "orbitron", serif;
		position: fixed;
		bottom: 13px;
		left: 50%;
		transform: translateX(-50%);
		display: flex;
		flex-wrap: wrap;
		justify-content: center; 
		gap: 50px; 
		z-index: 2;
		}
		.btn-success {
		box-shadow: 0 0 10px #ffc107;
		transition: all 0.3s ease;
		}
		.btn-success:hover {
		box-shadow: 0 0 15px #198754, 0 0 40px #ffc107;
		transform: scale(1.08);
		}
	</style>
</head>
<body>

	<img src="assets/img/pigeons.png" class="background" alt="Pigeon Spies">

	<div class="overlay container">
		<h1>You traveled to the future!</h1>
		<h4>Oh no! The world is taken over by robotic pigeon spies that demand humans for bread. What will you do?</h4>
	<div class="btn-container">
		<a href="page11.html" class="btn btn-success btn-md">Call the police for backup</a>
    	<a href="page12.html" class="btn btn-success btn-md">Protest for human control by stealing all bread</a>
	</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
