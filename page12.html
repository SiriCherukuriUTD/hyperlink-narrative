<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Nuclear War Death</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">

<style>
		body, html {
		margin: 0;
		padding: 0;
		height: 100%;
		color: white;
		}
		img.background {
		position: fixed;
		width: 100%;
		height: 100%;
		object-fit: cover;
		z-index: -1;
		}
		.overlay h1 {
			font-family: "Georgia", serif; 
			font-size: 3rem;
		}
		.overlay h4 {
			font-family: "Orbitron", serif;
		}
		.overlay .btn-container {
		font-family: "orbitron", serif;
		position: absolute;
		bottom: 35px;
		left: 50%;
		transform: translateX(-50%);
		display: flex;
		flex-wrap: wrap;
		justify-content: center; 
		gap: 50px; 
		}
		.btn-danger {
		box-shadow: 0 0 10px #ffc107;
		transition: all 0.3s ease;
		}
		.btn-danger:hover {
		box-shadow: 0 0 15px #dc3545, 0 0 40px #dc3545;
		transform: scale(1.08);
		}
	</style>
</head>
<body>

	<img src="assets/img/nuclear.png" class="background" alt="Explosion">

	<div class="overlay container">
		<h1>Bad choice...</h1>
		<h4>By taking away bread, you declared war. The pigeons have control of nuclear weapons...the world will end.</h4>
	<div class="btn-container">
    	<a href="page03.html" class="btn btn-danger btn-lg">Meet your fate</a>
	</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
