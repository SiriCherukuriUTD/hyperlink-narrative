<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Hyperlink Narrative Start</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

	<style>
		body, html {
		margin: 0;
		padding: 0;
		height: 100%;
		color: white;
		}
		img.background {
		position: fixed;
		width: 100%;
		height: 100%;
		object-fit: cover;
		z-index: -1;
		}
		.overlay h1 {
			font-family: "Georgia", serif;
			padding-top: 30px;
		}
		.overlay h4 {
			font-family: "Georgia", serif;
			padding-top: 10px
		}
		.line1, .line2, .line3, .line4 {
		opacity: 0;
		animation: fadeIn 1s forwards;
		}
		.line1 { animation-delay: .5s; }
		.line2 { animation-delay: 2.5s; }
		.line3 { animation-delay: 4.2s; }
		.line4 { animation-delay: 5.5s; }
		@keyframes fadeIn {
		to {opacity: 1;}
		}
		.glow {
		text-shadow:
		0 0 5px #ffffff,
		0 0 20px #6ccfff;
		}
		.overlay .btn-container {
		font-family: "Georgia", serif;
		position: absolute;
		bottom: 50px;
		left: 50%;
		transform: translateX(-50%);
		}
		.btn-light {
		border: 2px solid white;
		background-color: white;
		color: black;
		box-shadow: 0 0 8px rgb(255, 255, 255);
		transition: all 0.3s ease;
		}
		.btn-light:hover {
		box-shadow: 
		0 0 15px rgba(255,255,255,0.9),
		0 0 45px rgba(255,255,255,0.5);
    	transform: scale(1.05);
		}
	</style>
</head>
<body>

	<img src="assets/img/mysterious_home.png" class="background" alt="Mysterious Box">

	<div class="overlay container text-center">
		<h4 class="line1">You recently started working for a secret science lab.</h4>
		<h4 class="line2">One late shift, you stumbled upon a new hallway...</h4>
		<h1 class="line3 glow">What's that mysterious light ahead?</h1>
	<div class="btn-container line4 buttonAppear">
		<a href="page02.html" class="btn btn-light btn-lg">Go closer to it...</a>
	</div>
	</div>

	<script src="./assets/js/main.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
